<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>New patient · Health OS</title><link rel="stylesheet" href="../assets/app.css"><script defer src="../assets/app.js"></script></head><body data-page="patient-new" data-nav="patients" data-title="New patient">
<div class="toolbar"><div><h3 style="margin:0">New patient</h3><p class="mt">Create a patient record and consent profile</p></div><div class="rowbtns" style="margin-left:auto"><button class="btn ghost">Cancel</button><button class="btn primary"><svg class="ic"><use href="#i-check"/></svg> Save patient</button></div></div>
<div class="card"><div class="card-head"><div><h3>Personal details</h3></div></div><div class="card-body"><div class="form-grid">
<div class="field"><label>Full name</label><input placeholder="e.g. Ayesha Malik"></div>
<div class="field"><label>Date of birth</label><input type="date"></div>
<div class="field"><label>Gender</label><select><option>Female</option><option>Male</option><option>Other</option></select></div>
<div class="field"><label>Phone / WhatsApp</label><input placeholder="0300 0000000"></div>
<div class="field"><label>Email</label><input placeholder="name@email.com"></div>
<div class="field"><label>CNIC</label><input placeholder="35202-0000000-0"></div>
<div class="field"><label>City</label><input placeholder="Lahore"></div>
<div class="field"><label>Emergency contact</label><input placeholder="Name · 0300 0000000"></div>
</div></div></div>
<div class="card"><div class="card-head"><div><h3>Medical information</h3><p>Flag anything relevant before treatment</p></div></div><div class="card-body"><div class="form-grid">
<div class="field"><label>Allergies</label><input placeholder="e.g. Lidocaine, Sulfa"></div>
<div class="field"><label>Skin type</label><select><option>Fitzpatrick I</option><option>Fitzpatrick II</option><option>Fitzpatrick III</option><option selected>Fitzpatrick IV</option><option>Fitzpatrick V</option><option>Fitzpatrick VI</option></select></div>
<div class="field"><label>Conditions</label><input placeholder="e.g. Melasma, rosacea"></div>
<div class="field"><label>Current medications</label><input placeholder="e.g. Tretinoin 0.025%"></div>
<div class="field full"><label>Clinical notes</label><textarea placeholder="Any additional history, sensitivities or observations…"></textarea></div>
</div></div></div>
<div class="card"><div class="card-head"><div><h3>Consent</h3></div></div><div class="card-body"><div class="grid-2">
<div class="field" style="display:flex;justify-content:space-between;align-items:center"><div><label>Marketing communications</label><div class="mt">Offers and campaign updates via WhatsApp / email</div></div><span class="switch"></span></div>
<div class="field" style="display:flex;justify-content:space-between;align-items:center"><div><label>Clinical photos</label><div class="mt">Capture before/after images for records</div></div><span class="switch on"></span></div>
</div><div class="rowbtns" style="margin-top:16px;justify-content:flex-end"><button class="btn ghost">Cancel</button><button class="btn primary"><svg class="ic"><use href="#i-check"/></svg> Save patient</button></div></div></div>
</body></html>
