<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>New lead · Health OS</title><link rel="stylesheet" href="../assets/app.css"><script defer src="../assets/app.js"></script></head><body data-page="crm-lead-new" data-nav="crm-leads" data-title="New lead">
<div class="card"><div class="card-head"><div><h3>New lead</h3><p>Capture a new enquiry into the pipeline</p></div></div><div class="card-body"><div class="form-grid"><div class="field"><label>Full name</label><input placeholder="e.g. Ayesha Malik"></div><div class="field"><label>Phone / WhatsApp</label><input placeholder="+92 3XX XXXXXXX"></div><div class="field"><label>Source</label><select><option>Instagram</option><option>WhatsApp</option><option>Facebook</option><option>Walk-in</option><option>Referral</option><option>Google</option></select></div><div class="field"><label>Treatment interest</label><select><option>Botox</option><option>Dermal fillers</option><option>Lip fillers</option><option>Laser hair removal</option><option>Hydrafacial</option><option>PRP hair therapy</option><option>Hair transplant</option><option>Chemical peel</option><option>Microneedling</option></select></div><div class="field"><label>Assign to</label><select><option>Sana Iqbal</option><option>Bilal Ahmed</option><option>Hina Shah</option><option>Unassigned</option></select></div><div class="field"><label>Estimated budget (PKR)</label><input placeholder="Rs 45,000"></div><div class="field full"><label>Notes</label><textarea placeholder="Enquiry details, preferred timing, referral source…"></textarea></div></div><div class="rowbtns" style="margin-top:14px;justify-content:flex-end"><button class="btn ghost">Cancel</button><button class="btn primary">Save lead</button></div></div></div>
