      <tr><td>INV-1996</td><td>02 Jun</td><td class="tnum">18,500</td><td><span class="status s-good"><span class="dot"></span>Paid</span></td></tr>
      <tr><td>INV-1970</td><td>15 May</td><td class="tnum">12,000</td><td><span class="status s-good"><span class="dot"></span>Paid</span></td></tr>

  </div>

      <div class="segmented"><button class="on">Card</button><button>Safepay</button><button>EasyPaisa</button></div>
