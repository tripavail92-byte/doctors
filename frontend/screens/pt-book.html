<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Patient App — Book · Health OS</title><link rel="stylesheet" href="../assets/app.css"><script defer src="../assets/app.js"></script></head><body data-page="pt-book" data-title="Patient App — Book" data-shell="none">
<div class="phones"><div class="phone"><div class="screen">
<div class="pt-top"><div class="toolbar" style="justify-content:space-between"><div class="nm" style="color:#fff;font-weight:700">Book appointment</div><svg class="ic" style="color:#fff"><use href="#i-search"/></svg></div></div>
<div class="pt-body">
  <div class="card">
    <div class="card-head"><div><h3>Choose service</h3></div></div>
    <div class="card-body">
      <label class="leadcard" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span><b>HydraFacial</b><br><span class="mt">45 min · PKR 12,000</span></span><span class="status s-accent"><span class="dot"></span>Selected</span></label>
      <div class="leadcard" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span><b>Laser Rejuvenation</b><br><span class="mt">30 min · PKR 18,500</span></span><svg class="ic"><use href="#i-chevron"/></svg></div>
      <div class="leadcard" style="display:flex;justify-content:space-between;align-items:center"><span><b>Chemical Peel</b><br><span class="mt">40 min · PKR 9,500</span></span><svg class="ic"><use href="#i-chevron"/></svg></div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-head"><div><h3>Select date</h3></div></div>
    <div class="card-body">
      <div class="segmented"><button>Mon 13</button><button>Tue 14</button><button class="on">Wed 15</button><button>Thu 16</button><button>Fri 17</button></div>
      <div class="grid-3" style="margin-top:12px">
        <button class="btn ghost sm">10:00</button>
        <button class="btn ghost sm">11:30</button>
        <button class="btn primary sm">3:30</button>
        <button class="btn ghost sm">4:15</button>
        <button class="btn ghost sm" disabled>5:00</button>
        <button class="btn ghost sm">6:30</button>
      </div>
    </div>
  </div>

  <div class="alert s-info" style="margin-top:12px"><div class="ai"><svg class="ic"><use href="#i-wallet"/></svg></div><div class="txt">A refundable deposit of <b>PKR 2,000</b> is required to confirm.</div></div>
  <button class="btn primary" style="width:100%;margin-top:12px">Confirm booking</button>
</div>
<div class="pt-tabs">
  <a><svg class="ic"><use href="#i-dash"/></svg><span>Home</span></a>
  <a class="on"><svg class="ic"><use href="#i-cal"/></svg><span>Book</span></a>
  <a><svg class="ic"><use href="#i-plan"/></svg><span>Plan</span></a>
  <a><svg class="ic"><use href="#i-user"/></svg><span>Profile</span></a>
</div>
</div></div></div>
</body></html>
