<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>New appointment · Health OS</title><link rel="stylesheet" href="../assets/app.css"><script defer src="../assets/app.js"></script></head><body data-page="appt-new" data-nav="appt-calendar" data-title="New appointment">
<div class="card"><div class="card-head"><div><h3>New appointment</h3><p>Create a booking and hold the slot with a deposit</p></div></div><div class="card-body"><div class="form-grid"><div class="field"><label>Patient</label><input placeholder="Search name or MR#… e.g. Ayesha Malik"></div><div class="field"><label>Service / treatment</label><select><option>Botox — forehead</option><option>Dermal filler — lips</option><option>Laser hair removal</option><option>Hydrafacial</option><option>Chemical peel</option><option>PRP hair</option></select></div><div class="field"><label>Doctor</label><select><option>Dr. Fatima Noor</option><option>Dr. Ayesha Malik</option><option>Dr. Bilal Ahmed</option></select></div><div class="field"><label>Room</label><select><option>Injectables Suite</option><option>Laser Room</option><option>Derma 1</option></select></div><div class="field"><label>Date</label><input type="date" value="2026-07-14"></div><div class="field"><label>Time slot</label><select><option>10:00 AM</option><option>10:30 AM</option><option>11:00 AM</option><option>02:00 PM</option></select></div><div class="field"><label>Duration</label><select><option>30 min</option><option>45 min</option><option>60 min</option><option>90 min</option></select></div><div class="field"><label>Reference</label><input placeholder="Referral / walk-in"></div></div></div></div><div class="grid-2"><div class="card"><div class="card-head"><div><h3>Deposit to hold slot</h3><p>No-show protection</p></div></div><div class="card-body"><div class="form-grid"><div class="field"><label>Deposit amount (PKR)</label><input value="Rs 5,000"></div><div class="field"><label>Method</label><select><option>Card on file</option><option>JazzCash</option><option>Cash</option></select></div></div><div class="rowbtns" style="margin-top:14px;align-items:center;justify-content:space-between"><div><b>Require deposit</b><div class="mt">Slot released if unpaid in 2 hrs</div></div><span class="switch on"></span></div></div></div><div class="card"><div class="card-head"><div><h3>Reminders</h3><p>Automated confirmations</p></div></div><div class="card-body"><div class="rowbtns" style="align-items:center;justify-content:space-between;margin-bottom:12px"><div><b>WhatsApp</b><div class="mt">24 hrs &amp; 2 hrs before</div></div><span class="switch on"></span></div><div class="rowbtns" style="align-items:center;justify-content:space-between;margin-bottom:12px"><div><b>SMS</b><div class="mt">Fallback if no WhatsApp</div></div><span class="switch on"></span></div><div class="rowbtns" style="align-items:center;justify-content:space-between"><div><b>Email</b><div class="mt">Booking summary + prep notes</div></div><span class="switch"></span></div></div></div></div><div class="rowbtns" style="margin-top:14px;justify-content:flex-end"><button class="btn ghost">Cancel</button><button class="btn primary">Book appointment</button></div>
</body></html>
